<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS shell | Sneha Parmar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal">
        <div class="terminal-header">
            SNEHA_OS [Version 1.0.42] - (c) 2026 Core Systems.
        </div>
        <div id="terminal-content">
            <div class="line">Type 'help' to see available commands.</div>
        </div>
        <div class="line">
            <span class="prompt">guest@sneha:~$</span>
            <input type="text" id="cmd-input" class="command-input" autofocus autocomplete="off">
            <span class="cursor"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
